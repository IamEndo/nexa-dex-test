nexadex {
    server {
        host = "0.0.0.0"
        host = ${?NEXADEX_HOST}
        port = 9090
        port = ${?NEXADEX_PORT}
    }

    database {
        url = "jdbc:postgresql://localhost:5432/nexadex"
        url = ${?NEXADEX_DB_URL}
        user = "nexadex"
        user = ${?NEXADEX_DB_USER}
        password = "nexadex"
        password = ${?NEXADEX_DB_PASSWORD}
        maxPoolSize = 10
        maxPoolSize = ${?NEXADEX_DB_POOL_SIZE}
    }

    rostrum {
        url = "wss://electrum.nexa.org:20004"
        url = ${?NEXADEX_ROSTRUM_URL}
        useSsl = true
        useSsl = ${?NEXADEX_ROSTRUM_SSL}
    }

    security {
        rateLimitPerMinute = 120
        rateLimitPerMinute = ${?NEXADEX_RATE_LIMIT}
        swapRateLimitPerMinute = 30
        swapRateLimitPerMinute = ${?NEXADEX_SWAP_RATE_LIMIT}
    }

    trading {
        maxSlippageBps = 500
        maxSlippageBps = ${?NEXADEX_MAX_SLIPPAGE_BPS}
        maxPriceImpactBps = 1500
        maxPriceImpactBps = ${?NEXADEX_MAX_PRICE_IMPACT_BPS}
        minTradeNexSats = 546
        minTradeNexSats = ${?NEXADEX_MIN_TRADE_SATS}
        tradeQueueDepth = 50
        tradeQueueDepth = ${?NEXADEX_TRADE_QUEUE_DEPTH}
        tradeTimeoutMs = 30000
        tradeTimeoutMs = ${?NEXADEX_TRADE_TIMEOUT_MS}
    }

    indexer {
        reconciliationIntervalMs = 600000
        reconciliationIntervalMs = ${?NEXADEX_RECONCILE_INTERVAL_MS}
        confirmationBlocks = 1
        confirmationBlocks = ${?NEXADEX_CONFIRMATION_BLOCKS}
    }

    cors {
        origins = ""
        origins = ${?NEXADEX_CORS_ORIGINS}
    }
}
